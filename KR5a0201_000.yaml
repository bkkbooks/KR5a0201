front:
  text: 北斗七元星燈儀
  hash: sha256:92cddd7c28323b9c7029b7c626118a2ead958baf5e63786f185842486d766979
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0201_HFL_000-001a, image: hfl/0083/0083-072.png}
body:
  text: 法事如式伏聞開明三景九晨為梵氣之宗回度五常七政乃元綱之首定樞機於太極司喉舌於圎穹吐輝則調理四時含耀而恢張萬範三十六候冥劫會於天關一十二時辨方維於地紀紫微之上拱帝座以彌髙黃道之中布星𨇠而不忒或旁行越位正隂陽勃蝕之期或召運儛輪應日月推移之數靈鑒而無毫不顯淵通而有類咸均故得落死上生煥丹文於南極延齡益算注紫筆於東華昭明積善之家吻合降祥之慶今某人夙承妙廕生遇昌時荷帝念以罙深撫塵心而罔措輒邀真侣恭啓仙科㸃照太上北斗延生星燈法璇極以舒壇布銀缸而建斗紫煙縹眇想華蓋以藏身丹焰熒煌迓勾陳而隱景伏願花開善瑞燼落浮災福祿增崇發靈光於壽域吉祥至止靄沖氣於髙閎稽首歸依虔誠讃詠長生保命護身天尊臣衆等志心皈命樞宫大聖貪狼陽明真皇君斗中神仙諸靈官伏聞飛晨合景樞星掌劫㑹之權司政紏非陽明主璇璣之運上宰九天之化中監五嶽之靈下總人倫旁分品類定死生之有命鑒善惡以無私今某人恭欵芻心虔依妙範布斗極星辰之象備香花燈供之儀志心皈命樞宫大聖貪狼陽明真皇君伏願回光啓耀開寶鑒於靈圖注祿添年刻生名於玉簡罪消昔劫福廕後昆稽首歸依虔誠讃詠貪狼延生回真四靈流光下映洞煥玄冥七元紀籍固侍體靈靈真紀録上元衛形魂𩲸長守耳目無驚攝衛扶命胎真流行保真自然上升玉京臣衆等志心皈命璇宫大聖巨門隂精真皇君斗中神仙諸靈官伏聞星有五門協三光而逺映門開四照合萬氣以騰輝校天府之升遷主兆民之祿壽委質難逃於淵鑒通津實賴於明梁今某人藏事瑶壇馳誠金闕布斗極星辰之象備香花燈供之儀志心皈命璇宫大聖巨門隂精真皇君伏願身度千災命延百福天開神宇氣集真元碧簡題名固長年於劫石丹臺紀善增壽算於靈椿稽首歸依虔誠讃詠巨門度厄髙真靈仙流光輝映保命延年七元主籍自得長生消滅艱危災難移遷臟腑開明內外無愆光運合景與神同連鍊化自然上升玉京臣衆等志心皈命璣宫大聖祿存真人真皇君斗中神仙諸靈官伏聞偃息華蓋徒知空步之明潜洞太虛莫測飛神之妙八景九天之上道契清籙以通真五嶽四瀆之髙仙隸黃臺而受事矧兹下土實仰餘光令某人潔已齊盟法為壇墠布斗極星辰之象備香花燈供之儀志心皈命機宫大聖祿存真人真皇君伏願慶叶遐年福資浩劫三千萬之甲子地久天長一十二之靈門陽開隂閉翛間白日宴味沖和稽首歸依虔誠讃詠祿存保命髙真散神正氣攝伏侍衛敬賔七元上籍運致元真流演靈明契體洞津永辟不祥內守身形削死上生與神敷陳保舉自然上升玉晨臣衆等志心皈命權宫大聖文曲玄冥真皇君斗中神仙諸靈宫伏聞星主淵冥位司遊擊隱微潜耀領北帝之三宫福善禍淫攝黑靈之五氣或殄除凶勃飛火甲於六天或剪馘不臣耀朱兵於四鄙凡居動植皆出生成今某人灑落壇場肅清塵垢布斗極星辰之象備香花燈供之儀志心皈命權宫大聖文曲玄冥真皇君伏願削罪除愆落九隂之鬼録拘魂制𩲸得七返之仙方行藏無非橫之虞視息合太和之慶承兹上善永洽殊祥稽首歸依虔誠讃詠文曲益算流真散扶光映下衛與形同敷七元度籍洞煥玄無鎮護精神保衛形軀威神可畏真靈駕浮明視表裏與神齊俱保鍊自然上升玉虛臣衆等志心皈命衡宫大聖廉貞丹元真皇君斗中神仙諸靈官伏聞杳靄崑臺之上交映七門隱芒金蓋之輝潜通二景絳木結素華之實瓊津凝冶鍊之膏校録上真統攝鬼神之簿提綱下學權輿生死之機今某人澡雪襟靈遵承科簡布斗極星辰之象備香花燈供之儀志心皈命衡宫大聖廉貞丹元真皇君伏願善履三元削三災於短景順迎五運植五福於深根或在仕登榮盡繼清崇之世或行商坐賈皆為富盛之家稽首歸依虔誠讃詠廉貞消災四明開陽上靈散輝洞映神光七元衛籍司命延昌明上紀名使我綿長保固身命除凶去殃神真吐威流演洞鄉剋携自然上升玉堂臣衆等志心皈命闓陽宫大聖武曲北極真皇君斗中神仙諸靈官伏聞玉樓炳景隱飛華宸極之星瓊簡璨文紀回度空常之道定法輪之階級考至學之功勤飛芒耀於八門無幽不燭擲流光於萬里有礙皆通今某人委迹塵寰宅心道域布斗極星辰之象備香花燈供之儀志心皈命闓陽宫大聖武曲北極星皇君伏願一念關升萬靈佑序㵼銀河於碧漢克注遐年聳巨嶽於瑶空永躋上壽姻親和睦嗣族歡娛稽首歸依虔誠讃詠武曲散禍玄映除凶三光煥照萬氣流通七元注籍列位斗中檢身護命災難不逢上皇保真命祿無終正道長存與神無窮保命自然上升玉宫臣衆等志心皈命瑶光宫大聖破軍天關真皇君斗中神仙諸靈官伏聞天回地轉瑶光推空洞之輪斗建星𨇠虛皇紀運行之度位尊上帝威制羣魔正氣所臨萬物遂生成之性飛罡所指百邪無逃遁之形今某人滌垢舒壇披誠奉教布斗極星辰之象備香花燈供之儀志心皈命瑶光宫大聖破軍天關真皇君伏願道契丹臺南斗注長生之字罪消幽府北都詮不死之名四序營為盡叶光華之慶全家視履咸沾清淨之風稽首歸依虔誠讃詠七元覆護天尊破軍扶衰運致玄真南司保生延壽體寧七元典籍靈真榮名列位上仙合慶連并丹靈散光洞入玄冥騰霄飛翔與神同齡保命自然上升玉庭北斗七元星燈儀終
